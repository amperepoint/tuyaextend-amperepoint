set_planner:
  name: Set charging planner
  description: Save and enable or disable the minute-accurate weekly charging plan.
  fields:
    config_entry_id:
      required: true
      example: 01ABCDEF0123456789ABCDEF01
      selector:
        text:
    enabled:
      required: true
      selector:
        boolean:
    windows:
      required: true
      example:
        - id: weekday-night
          days: [0, 1, 2, 3, 4]
          start: "22:15"
          end: "06:45"
          current_a: 16
      selector:
        object:

set_planner_override:
  name: Set planner override
  description: Charge now, add a specific amount of energy, pause, or return to the weekly plan.
  fields:
    config_entry_id:
      required: true
      selector:
        text:
    mode:
      required: true
      selector:
        select:
          options:
            - charge
            - energy
            - pause
            - clear
    duration_minutes:
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min
    energy_kwh:
      selector:
        number:
          min: 0.1
          max: 200
          step: 0.1
          unit_of_measurement: kWh
    current_a:
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: A
